name: company-news-monitor

on:
  schedule:
    # 毎日 00:00 UTC = 09:00 JST に実行
    - cron: "0 0 * * *"
  workflow_dispatch: {}   # 手動実行も可能

permissions:
  contents: write          # state.json をコミットするために必要

concurrency:
  group: company-news-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: self-hosted   # VPS 上のセルフホストランナーで実行
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python venv
        run: |
          python3 -m venv .venv
          ./.venv/bin/pip install --upgrade pip
          ./.venv/bin/pip install -r requirements.txt

      - name: Run monitor
        env:
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: "587"
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: ./.venv/bin/python monitor.py

      - name: Commit updated state
        run: |
          if ! git diff --quiet -- state.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "chore: update news monitor state [skip ci]"
            git push
          else
            echo "state.json に変更なし。"
          fi
