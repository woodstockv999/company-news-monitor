name: company-news-monitor

on:
  schedule:
    # 6時間ごとに実行（00/06/12/18 UTC = 09/15/21/03 JST）
    - cron: "0 */6 * * *"
  workflow_dispatch: {}   # 手動実行も可能

permissions:
  contents: write          # state.json をコミットするために必要

concurrency:
  group: company-news-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: self-hosted   # VPS 上のセルフホストランナーで実行
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python venv
        run: |
          python3 -m venv .venv
          ./.venv/bin/pip install --upgrade pip
          ./.venv/bin/pip install -r requirements.txt

      - name: Run monitor
        env:
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: "587"
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: ./.venv/bin/python monitor.py

      - name: Commit updated state
        run: |
          if ! git diff --quiet -- state.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "chore: update news monitor state [skip ci]"
            for i in 1 2 3; do
              if git push; then
                break
              fi
              echo "push failed, retrying with rebase ($i/3)..."
              git fetch origin main
              git rebase origin/main
            done
          else
            echo "state.json に変更なし。"
          fi
