# 監視する企業の一覧。
# チャットで「追加して/外して」と指示するか、manage.py、もしくは直接編集で管理できます。
#
# 各企業は 1つ以上の source を持ちます:
#   type: rss   -> RSS/Atom フィードのURL（最も安定。推奨）
#   type: html  -> ニュース一覧ページのURL。item_selector で記事リンクを指定
#
# 現在は Google ニュースのRSS（企業名クエリ）で監視しています。
# 各社の公式サイトは bot ブロックでスクレイピングが不安定なため、
# 安定して取得できる Google ニュースRSSを採用しています。
# 公式プレスリリースのRSSが判明した企業は、その source を追加/差し替え可能です。
companies:
  - id: sony
    name: ソニーグループ
    sources:
      - type: rss
        url: "https://news.google.com/rss/search?q=%22%E3%82%BD%E3%83%8B%E3%83%BC%E3%82%B0%E3%83%AB%E3%83%BC%E3%83%97%22&hl=ja&gl=JP&ceid=JP:ja"

